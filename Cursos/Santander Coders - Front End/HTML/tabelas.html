<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <main>
        <h1>Tabelas no HTML</h1>
        <section id="students">
            <h2>Tabela de Alunos</h2>

            <table border="1"> <!-- Define conteúdo da tabela -->
                <thead> <!-- Cabeçalho da tabela -->
                    <tr> <!-- Define linha da tabela-->
                        <th>Nome</th> <!-- Coluna do cabeçalho -->
                        <th>E-mail</th>
                        <th>Matrícula</th>
                    </tr> 
                </thead>
                <tbody> <!-- Corpo da tabela -->
                    <tr>
                        <td>Kleber</td> <!-- Coluna do corpo --> 
                        <td>kleber@gmail.com</td>
                        <td>1</td>
                    </tr>
                    <tr>
                        <td>Camila</td>
                        <td>camila@gmail.com</td>
                        <td>2</td>
                    </tr>
                    <tr>
                        <td>Karin</td>
                        <td>karin@gmail.com</td>
                        <td>3</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section id="finance">
            <h2>Tabela de Controle Financeiro</h2>

            <table border="2">
                <thead>
                    <th>Data</th>
                    <th>Tipo</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                </thead>
                <tbody>
                    <tr>
                        <td rowspan="2">15/06/2022</td>
                        <td>Despesa</td>
                        <td>Almoço</td>
                        <td>R$ 35,00</td>
                    </tr>
                    <tr>
                        <td>Receita</td>
                        <td>Salário</td>
                        <td>R$ 3765,00</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
