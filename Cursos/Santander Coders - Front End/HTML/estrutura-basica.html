<!DOCTYPE html> <!-- Tipo do documento - Por padrão HTML5-->
<html lang="pt-BR"> <!-- Define o documento HTML e possui o atributo "lang" que define o idioma da página -->
<head>
    <meta charset="UTF-8"> <!-- declara a codificação de caracteres do documento -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge"> <!-- define compatibilidade com Internet Explorer -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Define a área da janela na qual o conteúdo da web pode ser visto. Isso geralmente não é do mesmo tamanho da página renderizada, caso em que o navegador fornece barras de rolagem para o usuário rolar e acessar todo o conteúdo.-->
    <title>Minha primeira página HTML</title> <!-- Título da Página no navegador -->
</head>
<body> <!-- Define todo o conteúdo que será visualizado na página -->
    <p>Isso é um parágrafo</p>
</body>
</html>
