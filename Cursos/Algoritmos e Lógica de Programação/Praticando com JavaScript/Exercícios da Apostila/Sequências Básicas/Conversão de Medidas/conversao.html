    <h1>Conversão de Medidas</h1>

    </p>
    <p>Ex:</p>
    <p>Digite uma distância em metros: 185.72 <br>
        A distância de 185.72m corresponde a: <br><div class="d-none d-sm-block">
            
        </div>
        0.18572Km&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;    1857.2dm <br>
        1.8572Hm&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 18572.0cm <br>
        18.572Dam&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 
        185720.0mm</p>
