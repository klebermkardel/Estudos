<body>
    <h1>Média Escolar</h1>
    <p>Crie um programa que leia duas notas de um aluno e calcule a sua média, mostrando uma mensagem no final, de acordo com a média atingida:</p>
    <ul>
        <li>Média até 4.9: REPROVADO</li>
        <li>Média entre 5.0 e 6.9: RECUPERAÇÃO</li>
        <li>Média 7.0 ou superior: APROVADO</li>
    </ul>
    <script src="./media.js"></script>
</body>
