<!DOCTYPE html>
<html lang="en">
<head>
    <title>HTML - Fundamentos</title>
</head>
<body style="padding-bottom: 500px;">
    <!-- 1 - Títulos -->
    <h1>Este é um título importante</h1>
    <h3>Um novo título</h3>

    <!-- 2 - Parágrafos -->
    <p>Descrição dos nossos serviços.</p>
    <p>Mais um parágrafo.</p>

    <!-- 3 - Tags sem conteúdo -->
    <p>Um parágrafo</p><br>
    <p>Segundo parágrafo.</p>
    <hr>
    <p>Terceiro parágrafo.</p>

    <!-- 4 - Comentários -->
    <!-- Isso é um comentário -->
    <h2>Mais um título</h2>
    <!-- Outro comentário -->

    <!-- 5 - Atributos -->
    <a href="https://www.google.com">Google</a>
    <br>

    <!-- 6 - Abrir link nova aba -->
    <a href="https://www.facebook.com" target="_blank">Facebook</a> (Abrir em nova aba)
    <br>

    <!-- 7 - Imagens -->
    <img src="Imagens no HTML/img/city.jpg" />

    <!-- 8 - Atributo alt -->
    <img src="Imagens no HTML/img/nature.jpg" alt="Noite na floresta" />
</body>
</html>
