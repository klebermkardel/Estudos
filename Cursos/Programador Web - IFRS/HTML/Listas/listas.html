<!DOCTYPE html>
<html>
<head>
  <title>Exemplo de Listas</title>
</head>
<body>
  <h1>Listas em HTML</h1>

  <h2>Lista Ordenada</h2>
  <ol>
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
  </ol>

  <h2>Lista Não Ordenada</h2>
  <ul>
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
  </ul>

  <h2>Lista de Definição</h2>
  <dl>
    <dt>Café</dt>
    <dd>Preto</dd>
    <dd>Quente</dd>

    <dt>Leite</dt>
    <dd>Branco</dd>
  </dl>
</body>
</html>
