<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap');

    :root {
      --yellow: hsl(47, 88%, 63%);
      --white: hsl(0, 0%, 100%);
      --grey: hsl(0, 0%, 50%);
      --black: hsl(0, 0%, 7%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Figtree', sans-serif;
      background-color: var(--yellow);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      gap: 20px;
    }

    .preview-card {
      background-color: var(--white);
      max-width: 384px;
      width: 100%;
      padding: 24px;
      border: 1px solid var(--black);
      border-radius: 20px;
      box-shadow: 8px 8p 0px var(--black);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .preview-card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 12px 12px 0px var(--black);
    }

    .card-image img {
      width: 100%;
      border-radius: 10px;
      display: block;
      margin-bottom: 24px;
    }

    .badge {
      background-color: var(--yellow);
      color: var(--black);
      font-weight: 800;
      font-size: 0.85rem;
      padding: 6px 12px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 12px;
    }

    .publish-date {
      color: var(--black);
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .card-title a {
      color: var(--black);
      text-decoration: none;
      font-size: 1.5rem;
      font-weight: 800;
      display: inline-block;
      margin-bottom: 12px;
    }

    .card-title a:hover {
      color: var(--yellow);
    }

    .card-description {
      color: var(--grey);
      font-size: 0.95rem;
      line-height: 1.5;
      font-weight: 500;
      margin-bottom: 24px;
    }

    .card-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    .author-name {
      color: var(--black);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="card-container">
    <article class="preview-card">
      <div class="card-image">
        <img src="./assets/images/illustration-article.svg" alt="HTML & CSS Foundations">
      </div>

      <div class="card-content">
        <span class="badge">Learning</span>

        <p class="publish-date">Published 21 Dec 2023</p>

        <h1 class="card-title"><a href="#">HTML & CSS foundations</a></h1>

        <p class="card-description">
          These languages are the backbone of every website, defining structure, content, and presentation.
        </p>
      </div>

      <footer class="card-author">
      <img src="./assets/images/image-avatar.webp" alt="Greg Hooper" class="avatar">
      <span class="author-name">Greg Hooper</span>
    </footer>
    </article>
  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
