<!-- Fundamentos do HTML - Tag div -->

<!DOCTYPE html>
<html>
    <head>
        <title>Fundamentos do HTML - Tag div</title>
        <style>
            body {
                background-color: rgb(246, 245, 243);
            }

            #football {
                background-color: rgb(157, 198, 235);
            }

            #basketball {
                background-color: rgb(238, 199, 151);
            }

            #voleyball {
                background-color: rgb(242, 160, 160);
            }
        </style>
    </head>
    <body>
        <h1>Esportes na Hora!</h1>
        <div id="football">
            <h2>Futebol</h2>
            <p>Aqui falamos sobre futebol</p>
        </div>
        <div id="basketball">
            <h2>Basquete</h2>
            <p>Aqui falamos sobre basquete</p>
        </div>
        <div id="voleyball">
            <h2>Vôlei</h2>
            <p>Aqui falamos sobre vôlei</p>
        </div>
    </body>
</html>
