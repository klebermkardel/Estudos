<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios DOM - Exibir Elemento</title>
</head>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
    }

    .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        height: 550px;
        width: 300px;
        border: 1px solid black;
        border-radius: 5px;
    }

    .image-card {
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom: 1px solid black;
    }

    .infos-card {
        display: flex;
        flex-direction: column;
        font-size: 1rem;
        justify-content: center;
        align-items: flex-start;
        margin-left: 20px;
    }

    .infos-card span {
        font-weight: bold;
    }

    img {
        height: 200px;
        width: 200px;
    }

    .btn {
        background-color: transparent;
        border: none;
        cursor: pointer;
    }
</style>
<body>
    <div class="container">
        <h1>Exibir Elemento</h1>
        <div class="card">
            <div class="image-card">
                <img class src="https://i5.walmartimages.com/seo/Sony-Playstation-4-Slim-Video-Game-Console-500GB-Jet-Black-PS4_20ddf697-5b4b-4323-ae66-be23d899d5ee.a5b0db1eecb5e3d49379f3148e69506b.jpeg" alt="Playstation 4">
            </div>
            <div class="infos-card">
                <p><span>Nome: </span> Playstation 4</p>
                <p><span>Fabricante: </span> Sony</p>
                <p><span>Ano de Lançamento: </span> 2013</p>
                <button class="btn">Mais Informações</button>
                <p class="more-infos">O PlayStation 4 (PS4) é o console da oitava geração da Sony. Ele foi lançado originalmente em 2013 e conta com três versões principais: Fat (original), Slim (mais compacta) e Pro (com suporte a 4K).</p>
            </div>
        </div>
    </div>
    <script>
        const moreInfos = document.querySelector(".more-infos")
        const botao = document.querySelector(".btn")

        moreInfos.style.display = "none"

        const alternarExbicao = () => {
            if(botao.textContent === "Mais Informações") {
                moreInfos.style.display = "block"
                botao.textContent = "Menos Informações"
            } else {
                moreInfos.style.display = "none"
                botao.textContent = "Mais Informações"
            }
        }

        botao.addEventListener("click", alternarExbicao)
    </script>
</body>
</html>
