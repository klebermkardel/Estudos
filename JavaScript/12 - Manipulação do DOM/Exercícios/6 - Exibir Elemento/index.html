<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/CSS/global-style.css">
    <title>Exercícios DOM - Exibir Elemento</title>
    <style>
        .card { 
            width: 300px; 
            border: 1px solid black; 
            border-radius: 5px; 
            padding: 15px; 
        }

        .btn { 
            background-color: transparent; 
            border: 1px solid #000; 
            padding: 5px; 
            cursor: pointer; 
            margin-top: 5px; 
        }

        .image-card {
            border-bottom: 1px solid #000;
        }
        
        .more-infos { margin-top: 10px; line-height: 1.4; }

        img {
            width: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Exibir Elemento</h1>
        <div class="card">
            <div class="image-card">
                <img class src="https://i5.walmartimages.com/seo/Sony-Playstation-4-Slim-Video-Game-Console-500GB-Jet-Black-PS4_20ddf697-5b4b-4323-ae66-be23d899d5ee.a5b0db1eecb5e3d49379f3148e69506b.jpeg" alt="Playstation 4">
            </div>
            <div class="infos-card">
                <p><span>Nome: </span> Playstation 4</p>
                <p><span>Fabricante: </span> Sony</p>
                <p><span>Ano de Lançamento: </span> 2013</p>
                <button class="btn">Mais Informações</button>
                <p class="more-infos">O PlayStation 4 (PS4) é o console da oitava geração da Sony. Ele foi lançado originalmente em 2013 e conta com três versões principais: Fat (original), Slim (mais compacta) e Pro (com suporte a 4K).</p>
            </div>
        </div>
    </div>

    <script>
        const moreInfos = document.querySelector(".more-infos");
        const botao = document.querySelector(".btn");

        // Define o estado inicial como oculto direto pela propriedade de estilo inline
        moreInfos.style.display = "none";

        const alternarExibicao = () => {
            // Verifica o estado textual atual do botão para decidir a ação
            if (botao.textContent === "Mais Informações") {
                moreInfos.style.display = "block"; // Altera o CSS para exibir o bloco
                botao.textContent = "Menos Informações"; // Atualiza o rótulo do botão
            } else {
                moreInfos.style.display = "none"; // Altera o CSS para ocultar o bloco
                botao.textContent = "Mais Informações"; // Retorna o rótulo original
            }
        };

        botao.addEventListener("click", alternarExibicao);
    </script>
</body>
</html>
