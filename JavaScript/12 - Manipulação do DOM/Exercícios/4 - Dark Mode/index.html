<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/CSS/global-style.css">
    <title>Exercícios DOM - Dark Mode</title>
    <style>
        p { font-size: 2rem; }

        .btn { 
            padding: 10px; 
            font-size: 1rem; 
            cursor: pointer; 
        }
        
        /* Classe que será injetada/removida dinamicamente no body */
        body.dark-mode { 
            background-color: #1a1a1a; 
            color: #ffffff; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dark Mode</h1>
        <p>Esse texto vai mudar de cor</p>
        <button class="btn">Modo Escuro</button>
    </div>

    <script>
        // Seleciona o botão
        const botao = document.querySelector(".btn");

        const alternarModoEscuro = () => {
            // classList.toggle adiciona a classe se ela não existir, ou remove se ela já existir
            document.body.classList.toggle("dark-mode");

            // classList.contains verifica se a classe está ativa no momento para mudar o texto do botão
            if (document.body.classList.contains("dark-mode")) {
                botao.textContent = "Modo Claro";
            } else {
                botao.textContent = "Modo Escuro";
            }
        };

        botao.addEventListener("click", alternarModoEscuro);
    </script>
</body>
</html>
