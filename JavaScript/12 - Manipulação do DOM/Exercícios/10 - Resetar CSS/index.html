<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios DOM - Zerar Estilos</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 15px;
        }

        /* Estilo base do nosso elemento (CSS limpo) */
        .caixa-teste {
            width: 200px;
            height: 100px;
            background-color: #ccc;
            border: 2px dashed #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 15px;
            border: 1px solid #000;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-modificar { background-color: #ffe600; }
        .btn-resetar { background-color: #ff4d4d; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zerar Estilos Inline</h1>
        
        <div class="caixa-teste">Objeto Base</div>

        <div class="actions">
            <button class="btn-modificar">Modificar via JS</button>
            <button class="btn-resetar">Zerar Estilos</button>
        </div>
    </div>

    <script>
        const caixa = document.querySelector(".caixa-teste");
        const btnModificar = document.querySelector(".btn-modificar");
        const btnResetar = document.querySelector(".btn-resetar");

        /**
         * Simula uma avalanche de modificações visuais inline via JS.
         */
        const modificarElemento = () => {
            caixa.style.backgroundColor = "purple";
            caixa.style.color = "white";
            caixa.style.borderRadius = "50px";
            caixa.style.border = "5px solid cyan";
            caixa.style.transform = "scale(1.2)";
            caixa.textContent = "Modificado!";
        };

        /**
         * Limpa instantaneamente todos os estilos injetados pelo JS,
         * fazendo o elemento voltar a obedecer apenas o arquivo CSS original.
         */
        const zerarEstilos = () => {
            // Ao atribuir uma string vazia para o cssText, o JS apaga o atributo 'style' do HTML
            caixa.style.cssText = "";
            
            // Restaura o texto original
            caixa.textContent = "Objeto Base";
        };

        btnModificar.addEventListener("click", modificarElemento);
        btnResetar.addEventListener("click", zerarEstilos);
    </script>
</body>
</html>
