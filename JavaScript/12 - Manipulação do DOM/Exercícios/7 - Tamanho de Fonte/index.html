<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios DOM - Tamanho de Fonte</title>
    <style>
        body { 
            font-family: 
            Arial, Helvetica, sans-serif; 
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        .actions { 
            display: flex; 
            gap: 10px; 
            align-items: center; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tamanho da Fonte</h1>
        <p class="texto">Texto que vai aumentar ou diminuir</p>
        <div class="actions">
            <button class="btn-diminuir">Diminuir Fonte</button>
            <span class="tamanho-da-fonte"></span>
            <button class="btn-aumentar">Aumentar Fonte</button>
        </div>
    </div>

    <script>
        const texto = document.querySelector(".texto");
        const botaoDiminuir = document.querySelector(".btn-diminuir");
        const botaoAumentar = document.querySelector(".btn-aumentar");
        const textoTamanhoFonte = document.querySelector(".tamanho-da-fonte");

        // Captura os estilos reais calculados pelo navegador para o elemento
        const estilos = window.getComputedStyle(texto);
        // Extrai o valor atual da propriedade CSS 'font-size' (retorna ex: "16px")
        const tamanhoFonteInicial = estilos.getPropertyValue('font-size');

        // Usamos 'let' para criar uma variável mutável, convertendo "16px" para o número 16
        let valorTamanhoFonte = parseInt(tamanhoFonteInicial, 10);

        // Exibe o tamanho inicial na tela dentro do span
        textoTamanhoFonte.textContent = `${valorTamanhoFonte}px`;

        // Função responsável por subtrair 2px da fonte
        const diminuirFonte = () => {
            valorTamanhoFonte = valorTamanhoFonte - 2; // Atualiza o número na memória
            texto.style.fontSize = `${valorTamanhoFonte}px`; // Injeta o novo estilo no texto
            textoTamanhoFonte.textContent = `${valorTamanhoFonte}px`; // Sincroniza o número na tela
        };

        // Função responsável por somar 2px à fonte
        const aumentarFonte = () => {
            valorTamanhoFonte = valorTamanhoFonte + 2; // Atualiza o número na memória
            texto.style.fontSize = `${valorTamanhoFonte}px`; // Injeta o novo estilo no texto
            textoTamanhoFonte.textContent = `${valorTamanhoFonte}px`; // Sincroniza o número na tela
        };

        // Associa os cliques aos seus respectivos motores de função
        botaoDiminuir.addEventListener("click", diminuirFonte);
        botaoAumentar.addEventListener("click", aumentarFonte);
    </script>
</body>
</html>
