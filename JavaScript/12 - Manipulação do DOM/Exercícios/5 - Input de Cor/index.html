<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios DOM - Input de Cor</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif; 
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            gap: 10px; 
        }

        #cor { 
            padding: 5px; 
            text-align: center; 
            font-size: 1rem; 
        }

        .btn { 
            padding: 
            10px; font-weight: bold; 
            cursor: pointer; 
        }
        
        .paragrafos { width: 50%; text-align: justify; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Input de Cor</h1>
        <div>
            <label for="cor">Digite uma cor (inglês ou hexadecimal):</label>
            <input type="text" id="cor" placeholder="Ex: blue ou #ff0000">
        </div>
        <button class="btn">Alterar Cor</button>
        <div class="paragrafos">
            <p>Primeiro parágrafo de exemplo para testes de estilos.</p>
            <p>Segundo parágrafo capturado e manipulado via coleção de dados.</p>
        </div>
    </div>

    <script>
        const inputCor = document.querySelector("#cor");
        const botao = document.querySelector(".btn");
        // Captura todos os parágrafos criando um NodeList (lista de elementos)
        const paragrafos = document.querySelectorAll("p"); 

        const mudarCor = () => {
            // BOA PRÁTICA: Pegamos o .value aqui dentro para capturar o texto exato do MOMENTO do clique
            const corDesejada = inputCor.value;

            // Como 'paragrafos' é uma lista, precisamos rodar o .forEach para pintar um por um
            paragrafos.forEach(paragrafo => {
                paragrafo.style.color = corDesejada;
            });
        };

        botao.addEventListener("click", mudarCor);
    </script>
</body>
</html>
