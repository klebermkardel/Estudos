<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício DOM - Semáforo Digital</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif; 
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        .circulo { 
            height: 100px; 
            width: 100px; 
            border: 1px solid #000; 
            border-radius: 50%; 
            margin-bottom: 20px; 
            transition: background-color 0.3s; 
        }

        .botoes { 
            display: flex; 
            justify-content: space-between; 
            width: 100%; 
            max-width: 300px; 
        }

        .btn { 
            padding: 10px; 
            border-radius: 10px; 
            border: none; 
            font-size: 1rem; 
            font-weight: bold; 
            cursor: pointer; 
            color: #fff; 
        }

        .btn-verde { background-color: #1d6a06; }
        .btn-amarelo { background-color: #ebe304; color: #000; }
        .btn-vermelho { background-color: #e10404; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Semáforo Digital</h1>
        <div class="circulo"></div>
        <div class="botoes">
            <button class="btn btn-verde" data-cor="#1d6a06">Verde</button>
            <button class="btn btn-amarelo" data-cor="#ebe304">Amarelo</button>
            <button class="btn btn-vermelho" data-cor="#e10404">Vermelho</button>
        </div>
    </div>

    <script>
        // Seleciona os elementos
        const circulo = document.querySelector(".circulo");
        // querySelectorAll seleciona TODOS os botões, criando uma lista (array)
        const botoes = document.querySelectorAll(".btn");

        // Função única para tratar qualquer um dos cliques (Princípio DRY)
        const mudarCorSemaforo = (evento) => {
            // evento.target é o elemento específico que disparou o clique
            // dataset.cor lê o valor que escrevemos em 'data-cor' no HTML
            const corSelecionada = evento.target.dataset.cor;
            
            // Injeta a cor de fundo dinamicamente no elemento círculo
            circulo.style.backgroundColor = corSelecionada;
        };

        // Percorre a lista de botões adicionando o ouvinte de clique em cada um deles
        botoes.forEach(botao => {
            botao.addEventListener("click", mudarCorSemaforo);
        });
    </script>
</body>
</html>
