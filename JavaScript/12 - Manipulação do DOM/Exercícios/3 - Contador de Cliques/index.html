<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/CSS/global-style.css">
    <title>Exercícios DOM - Contador de Cliques</title>
    <style>
        .contador { 
            font-size: 2rem; 
            font-weight: bold; 
        }

        .btn { 
            padding: 20px; 
            font-size: 1rem; 
            margin-top: 10px; 
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="titulo">Contador de Cliques</h1>
        <span class="contador">0</span>
        <button class="btn">Clicar</button>
    </div>

    <script>
        // Seleciona os elementos
        const elemento = document.querySelector(".contador");
        const botao = document.querySelector(".btn");

        // Captura o texto inicial ("0") do HTML e converte em tipo numérico real
        let contador = parseInt(elemento.textContent, 10);

        const clicar = () => {
            // 1. Atualiza o valor numérico do contador
            contador++; 
            
            // 2. Injeta o número atualizado de volta no HTML para atualizar a tela do usuário
            elemento.textContent = contador;
        };

        botao.addEventListener("click", clicar);
    </script>
</body>
</html>
