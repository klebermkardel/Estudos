

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício DOM - Saudação</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif; 
        }
        
        .container {
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            flex-direction: column;
        }

        .btn-saudacao {
            padding: 10px; 
            font-size: 1rem; 
            font-weight: bolder;
            border-radius: 5px; 
            border: none; 
            background-color: #9aecda; 
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="titulo">Bom dia!</h1>
        <button class="btn-saudacao">Fazer Saudação</button>
    </div>

    <script>
        // Seleciona os elementos pelo ID e pela classe
        const titulo = document.querySelector("#titulo");
        const botao = document.querySelector(".btn-saudacao");

        // Função executada quando o usuário clica no botão
        const saudar = () => {
            // Altera o conteúdo de texto interno da tag H1
            titulo.innerText = "Boa noite!";
        };

        // Adiciona um ouvinte de evento para capturar o clique e disparar a função
        botao.addEventListener("click", saudar);
    </script>
</body>
</html>
