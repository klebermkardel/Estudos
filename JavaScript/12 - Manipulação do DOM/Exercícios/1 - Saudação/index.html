<!-- Saudação: Crie um botão que, ao ser clicado, muda o texto de um <h1> de "Bom dia" para "Boa noite". -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício DOM - Saudação</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .btn-saudacao {
            padding: 10px;
            font-size: 1rem;
            font-weight: bolder;
            border-radius: 5px;
            border: none;
            background-color: #9aecda;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="titulo">Bom dia!</h1>
        <button class="btn-saudacao">Fazer Saudação</button>
    </div>

    <script>
        // Seleção dos elementos mapeados na árvore do DOM
        const titulo = document.querySelector("#titulo");
        const botao = document.querySelector(".btn-saudacao");

        /**
        * Função de callback vinculada ao evento de clique.
        * Altera o nó de texto interno do elemento h1 selecionado.
        */
        const saudar = () => {
        // Altera o conteúdo textual de "Bom dia!" para "Boa noite!"
        titulo.innerText = "Boa noite!";
        };

        // Registra o escutador de eventos do tipo clique no botão
        botao.addEventListener("click", saudar);
    </script>
</body>
</html>
