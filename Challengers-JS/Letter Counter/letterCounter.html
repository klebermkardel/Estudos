<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Letter Counter</title>
</head>
<body>
    <div class="container">
        <h1>Challengers JavaScript</h1>
        <h2>Letter Counter</h2>
        <div class="form">
            <label for="phrase">Digite uma frase:</label>
            <input type="text" id="phrase">
            <label for="letter">Digite a letra que deseja verificar:</label>
            <input type="text" id="letter">
            <button onclick="countLetter()">To check</button>
        </div>
        <p id="result"></p>
    </div>
    <script src="letterCounter.js"></script> 
</body>
</html>
